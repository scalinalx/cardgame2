<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conquest of Erathia — UI Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cinzel+Decorative:wght@700;900&family=EB+Garamond:ital@0;1&family=MedievalSharp&family=Uncial+Antiqua&family=Grenze+Gotisch:wght@500;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap');

/* ============================ BASE ============================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { background: #0d0b12; color: #eee; font-family: 'Spectral', Georgia, serif; }
button { font-family: inherit; cursor: pointer; }

/* ---- lab switcher bar ---- */
.lab-bar { position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 16px;
  padding: 10px 18px; background: linear-gradient(#1c1a24, #131119); border-bottom: 1px solid #332f42;
  box-shadow: 0 4px 18px rgba(0,0,0,.5); flex-wrap: wrap; }
.lab-bar .lab-title { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: .08em; color: #e8c34a; font-size: 16px; }
.lab-bar select { font-family: 'Cinzel', serif; font-size: 15px; padding: 8px 12px; border-radius: 8px;
  background: #221f2c; color: #f3ecd6; border: 1px solid #4a4560; }
.lab-bar .desc { color: #b9aef0; font-size: 13.5px; font-style: italic; flex: 1; min-width: 220px; }
.lab-bar .swatch { display: inline-flex; gap: 4px; }
.lab-bar .swatch i { width: 16px; height: 16px; border-radius: 3px; display: inline-block; border: 1px solid rgba(255,255,255,.2); }

#stage { min-height: calc(100vh - 56px); padding: 18px; }

/* shared sample helpers reused by themes */
.track-bar { height: 9px; border-radius: 6px; overflow: hidden; }
.hexmap { width: 100%; height: auto; display: block; }

/* ====================================================================
   THEME 1 — ILLUMINATED CODEX  (aged tome, gold leaf, blackletter)
   ==================================================================== */
.t-codex { font-family: 'EB Garamond', Georgia, serif; color: #3a2c17;
  background:
    radial-gradient(120% 90% at 50% 0%, #f3e6c4, #e7d3a4 60%, #d8bf85 100%); }
.t-codex .frame { max-width: 1320px; margin: 0 auto; padding: 26px 30px; border-radius: 6px; position: relative;
  background:
    repeating-linear-gradient(0deg, rgba(120,80,30,.025) 0 2px, transparent 2px 4px),
    linear-gradient(#f7ecd0, #efe0bd);
  box-shadow: 0 0 0 2px #c9a558, 0 0 0 10px #efe0bd, 0 0 0 12px #b48b3e, 0 30px 60px rgba(0,0,0,.5);
  border: 1px solid #b48b3e; }
.t-codex .corner { position: absolute; width: 64px; height: 64px; color: #b08327; opacity: .9; }
.t-codex .corner.tl { top: 6px; left: 6px; }
.t-codex .corner.tr { top: 6px; right: 6px; transform: scaleX(-1); }
.t-codex .corner.bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
.t-codex .corner.br { bottom: 6px; right: 6px; transform: scale(-1); }
.t-codex h1.title { font-family: 'Cinzel Decorative', serif; font-weight: 900; text-align: center;
  color: #7a1f1a; font-size: clamp(26px, 4vw, 42px); margin: 4px 0 2px; letter-spacing: .04em;
  text-shadow: 0 1px 0 #e9cf95; }
.t-codex .subtitle { text-align: center; font-style: italic; color: #8a6a37; margin-bottom: 16px; }
.t-codex .rule { height: 2px; background: linear-gradient(90deg, transparent, #b48b3e, transparent); margin: 10px 0 16px; }
.t-codex .spread { display: grid; grid-template-columns: 1fr 1.4fr 1fr; gap: 26px; }
.t-codex .ill-col { text-align: center; }
.t-codex .vellum { background: linear-gradient(#fbf3da, #f0e2bd); border: 1px solid #c9a558; border-radius: 4px;
  padding: 12px; box-shadow: inset 0 0 30px rgba(150,110,40,.12); }
.t-codex h3 { font-family: 'Cinzel', serif; color: #7a1f1a; font-size: 15px; letter-spacing: .06em;
  border-bottom: 1px solid #c9a558; padding-bottom: 5px; margin: 0 0 10px; }
.t-codex .dropcap::first-letter { font-family: 'Cinzel Decorative', serif; font-size: 3.1em; float: left;
  line-height: .8; padding: 4px 8px 0 0; color: #7a1f1a; }
.t-codex .tracks .trk { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
.t-codex .tracks .trk .nm { width: 96px; font-variant: small-caps; font-size: 14px; }
.t-codex .track-bar { background: #e0ca98; border: 1px solid #b48b3e; flex: 1; }
.t-codex .track-bar > i { display: block; height: 100%; background: linear-gradient(90deg, #b8902f, #e8c34a); }
.t-codex .map-cap { font-style: italic; color: #8a6a37; font-size: 13px; margin-top: 6px; }
.t-codex .res-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 12px 0; }
.t-codex .res { background: #f3e7c6; border: 1px solid #c9a558; border-radius: 20px; padding: 4px 12px; font-weight: 600; }
.t-codex .hand { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
.t-codex .mcard { background: linear-gradient(#fbf3da, #efe1bc); border: 1px solid #b48b3e; border-radius: 5px;
  padding: 10px; position: relative; box-shadow: 2px 3px 0 rgba(150,110,40,.18); }
.t-codex .mcard .cn { font-family: 'Cinzel', serif; font-weight: 700; color: #5a2018; }
.t-codex .mcard .cc { position: absolute; top: 8px; right: 10px; width: 30px; height: 30px; border-radius: 50%;
  background: radial-gradient(circle at 34% 30%, #fff3c4, #d8a93a 70%, #9a6f15); border: 1px solid #7d5a12;
  display: flex; align-items: center; justify-content: center; font-weight: 800; color: #4a2f08; }
.t-codex .mcard .tg { font-variant: small-caps; color: #8a6a37; font-size: 12px; }
.t-codex .mcard .tx { font-size: 13px; margin-top: 4px; line-height: 1.35; }
.t-codex .act { display: block; width: 100%; text-align: left; background: linear-gradient(#f6ead0, #ecdcb4);
  border: 1px solid #c9a558; border-radius: 4px; padding: 8px 10px; margin: 7px 0; color: #4a2f17; }
.t-codex .act b { font-family: 'Cinzel', serif; color: #5a2018; }
.t-codex .seal { position: absolute; right: 24px; bottom: 18px; width: 70px; height: 70px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #c0413a, #7a1f1a 70%, #4d120f); color: #f4d9a0;
  display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 11px;
  text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,.4); transform: rotate(-8deg); }

/* ====================================================================
   THEME 2 — OBSIDIAN & GOLD  (cinematic dark, ornate filigree, focal)
   ==================================================================== */
.t-obsidian { font-family: 'Spectral', Georgia, serif; color: #e9e2d2; position: relative;
  background:
    radial-gradient(120% 80% at 50% -10%, #2a2540, #16131f 55%, #0a0810 100%); }
.t-obsidian::before { content:''; position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(60% 50% at 50% 40%, rgba(232,195,74,.06), transparent 70%); }
.t-obsidian .ob-top { display: flex; align-items: center; gap: 22px; max-width: 1500px; margin: 0 auto 14px;
  padding: 12px 22px; border-radius: 14px; flex-wrap: wrap;
  background: linear-gradient(#221d30, #16121e); border: 1px solid #6b5a2e;
  box-shadow: 0 0 0 1px #3a3450, 0 18px 40px rgba(0,0,0,.55); }
.t-obsidian .ob-brand { font-family: 'Cinzel Decorative', serif; font-weight: 900; font-size: 20px;
  color: #e8c34a; letter-spacing: .06em; text-shadow: 0 0 18px rgba(232,195,74,.4); }
.t-obsidian .ob-tracks { display: flex; gap: 18px; flex: 1; justify-content: center; flex-wrap: wrap; }
.t-obsidian .ob-trk { min-width: 150px; text-align: center; }
.t-obsidian .ob-trk .lbl { font-variant: small-caps; letter-spacing: .08em; color: #cbbd92; font-size: 13px; }
.t-obsidian .track-bar { background: #0c0a14; border: 1px solid #6b5a2e; margin-top: 4px; }
.t-obsidian .track-bar > i { display: block; height: 100%; background: linear-gradient(90deg, #8a6a1f, #f0d168); box-shadow: 0 0 10px rgba(232,195,74,.6); }
.t-obsidian .ob-glory { font-family: 'Cinzel', serif; color: #e8c34a; font-size: 22px; }
.t-obsidian .ob-stage { max-width: 1500px; margin: 0 auto; display: grid; grid-template-columns: 270px 1fr 300px; gap: 16px; align-items: start; }
.t-obsidian .gpanel { background: linear-gradient(#1d1928f0, #14111dF0); border-radius: 14px; padding: 14px 16px;
  border: 1px solid #4a4366; box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 12px 30px rgba(0,0,0,.5); position: relative; }
.t-obsidian .gpanel::before { content:''; position:absolute; inset:5px; border:1px solid rgba(232,195,74,.16); border-radius:9px; pointer-events:none; }
.t-obsidian h3 { font-family: 'Cinzel', serif; color: #e8c34a; font-size: 14px; letter-spacing: .07em; margin: 0 0 10px;
  border-bottom: 1px solid #3a3450; padding-bottom: 6px; }
.t-obsidian .map-wrap { text-align: center; padding: 6px; }
.t-obsidian .proclaim { text-align: center; color: #cbbd92; font-style: italic; margin: 4px 0 12px; }
.t-obsidian .proclaim b { color: #e8c34a; font-style: normal; }
.t-obsidian .res-hud { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
.t-obsidian .res { display: flex; align-items: center; gap: 5px; background: #0f0c18; border: 1px solid #4a4366;
  border-radius: 18px; padding: 4px 12px; }
.t-obsidian .res b { color: #f3ecd6; }
.t-obsidian .res small { color: #8fd29a; }
.t-obsidian .hand { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
.t-obsidian .mcard { width: 168px; border-radius: 11px; padding: 11px; position: relative;
  background: linear-gradient(#2a2438, #1b1626); border: 1px solid #4a4366; box-shadow: 0 10px 22px rgba(0,0,0,.5); }
.t-obsidian .mcard.gold { border-color: #b8932f; box-shadow: 0 0 0 1px rgba(232,195,74,.3), 0 10px 22px rgba(0,0,0,.5); }
.t-obsidian .mcard .cn { font-family: 'Cinzel', serif; font-weight: 700; color: #f3ecd6; font-size: 14px; }
.t-obsidian .mcard.gold .cn { color: #f0d168; }
.t-obsidian .mcard .cc { position: absolute; top: 9px; right: 10px; width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 34% 30%, #fff7c6, #e8c34a 60%, #b8932f); color: #2a2014;
  display: flex; align-items: center; justify-content: center; font-weight: 800; }
.t-obsidian .mcard .ty { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #74c47e; margin-top: 2px; }
.t-obsidian .mcard .ty.power { color: #6fa8e6; } .t-obsidian .mcard .ty.spell { color: #d98ad9; }
.t-obsidian .mcard .tx { font-size: 12px; color: #ddd3ba; margin-top: 6px; line-height: 1.35; }
.t-obsidian .act { display: flex; justify-content: space-between; width: 100%; text-align: left;
  background: linear-gradient(#272235, #1a1626); color: #e9e2d2; border: 1px solid #4a4366; border-radius: 9px;
  padding: 9px 11px; margin: 7px 0; }
.t-obsidian .act .cost { color: #e8c34a; }
.t-obsidian .act b { font-family: 'Cinzel', serif; }
.t-obsidian .goal { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #3a3450; font-size: 13.5px; }
.t-obsidian .wonder { background: #0f0c18; border: 1px solid #6b5a2e; border-radius: 10px; padding: 8px 10px; margin-top: 6px; }
.t-obsidian .wonder .wn { color: #e8c34a; font-family: 'Cinzel', serif; }

/* ====================================================================
   THEME 3 — CARVED HARDWOOD  (skeuomorphic HOMM3 town-screen)
   ==================================================================== */
.t-wood { font-family: 'MedievalSharp', 'Spectral', serif; color: #f0e4cc;
  background:
    repeating-linear-gradient(94deg, #3a2616 0 7px, #432d19 7px 9px, #34220f 9px 15px),
    linear-gradient(#3a2616, #2a1c10); }
.t-wood .timber { max-width: 1400px; margin: 0 auto; padding: 18px; border-radius: 10px;
  background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 3px, transparent 3px 11px),
    linear-gradient(#5a3f23, #4a3119);
  border: 6px solid #2c1d0e;
  box-shadow: 0 0 0 3px #6b4a26, inset 0 0 50px rgba(0,0,0,.5), 0 24px 50px rgba(0,0,0,.6); }
.t-wood .rivets::before, .t-wood .rivets::after { content:''; }
.t-wood .stone { background:
    radial-gradient(120% 120% at 30% 20%, #6d6a72, #44424c 70%, #34323a);
  border: 3px solid #23222a; border-radius: 8px;
  box-shadow: inset 0 2px 6px rgba(255,255,255,.12), inset 0 -8px 18px rgba(0,0,0,.5), 0 6px 14px rgba(0,0,0,.5);
  padding: 12px 14px; position: relative; }
.t-wood .stone::before { content:''; position:absolute; inset:5px; border-radius:5px; border:1px solid rgba(0,0,0,.4); pointer-events:none; }
.t-wood .banner { text-align: center; margin: 0 auto 14px; max-width: 640px; padding: 10px 30px; color: #ffe7a8;
  font-size: clamp(22px, 3vw, 34px); font-weight: 700; letter-spacing: .03em;
  background: linear-gradient(#8a1f1a, #5a120f); border: 3px solid #e8c34a; border-radius: 6px;
  box-shadow: 0 8px 16px rgba(0,0,0,.5), inset 0 0 20px rgba(0,0,0,.4);
  clip-path: polygon(0 0, 100% 0, 100% 76%, 50% 100%, 0 76%); padding-bottom: 26px;
  text-shadow: 0 2px 0 #3a0c0a; font-family: 'Cinzel', serif; }
.t-wood .townrow { display: grid; grid-template-columns: 230px 1fr 250px; gap: 16px; align-items: start; }
.t-wood h3 { font-family: 'Cinzel', serif; color: #ffe7a8; font-size: 15px; margin: 0 0 8px;
  text-shadow: 0 1px 0 #000; letter-spacing: .04em; }
.t-wood .tracks .trk { margin: 9px 0; }
.t-wood .tracks .nm { font-size: 13px; color: #f0e4cc; }
.t-wood .track-bar { height: 13px; background: #1c140b; border: 2px solid #1c140b; border-radius: 7px; box-shadow: inset 0 2px 4px rgba(0,0,0,.7); }
.t-wood .track-bar > i { display: block; height: 100%; border-radius: 5px; background: linear-gradient(#f0d168, #b8902f); box-shadow: inset 0 1px 0 rgba(255,255,255,.4); }
.t-wood .ibtn { display: block; width: 100%; text-align: left; margin: 8px 0; padding: 10px 12px; color: #1c140b;
  font-family: 'Cinzel', serif; font-weight: 700; border-radius: 6px;
  background: linear-gradient(#d9b059, #b07f2e); border: 2px solid #7a531c;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 4px 0 #6b4a1a, 0 6px 10px rgba(0,0,0,.4); }
.t-wood .ibtn:active { transform: translateY(3px); box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 1px 0 #6b4a1a; }
.t-wood .ibtn small { display: block; font-family: 'Spectral', serif; font-weight: 400; color: #3a2a12; font-size: 12px; }
.t-wood .map-wrap { text-align: center; }
.t-wood .res-tray { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
.t-wood .res { background: radial-gradient(120% 120% at 30% 20%, #6d6a72, #3f3d47); border: 2px solid #23222a;
  border-radius: 7px; padding: 5px 11px; font-weight: 700; box-shadow: inset 0 1px 3px rgba(255,255,255,.15); }
.t-wood .cardtray { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
.t-wood .mcard { width: 160px; padding: 10px; border-radius: 8px; position: relative; color: #f4ead2;
  background: linear-gradient(#5a3f23, #3a2614); border: 3px solid #2c1d0e;
  box-shadow: inset 0 0 18px rgba(0,0,0,.5), 0 6px 14px rgba(0,0,0,.5); }
.t-wood .mcard .cn { font-family: 'Cinzel', serif; font-weight: 700; color: #ffe7a8; font-size: 13.5px; }
.t-wood .mcard .cc { position: absolute; top: 8px; right: 9px; width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 34% 30%, #fff3c4, #d8a93a 70%, #9a6f15); color: #3a2608; font-weight: 800;
  display: flex; align-items: center; justify-content: center; border: 1px solid #2c1d0e; }
.t-wood .mcard .tx { font-size: 12px; margin-top: 5px; line-height: 1.3; color: #e6d8b8; }

/* ====================================================================
   THEME 4 — ARCANE CONFLUX  (mystic glass on a nebula, glowing runes)
   ==================================================================== */

  background:

    radial-gradient(70% 60% at 85% 30%, rgba(40,180,200,.28), transparent 60%),
    radial-gradient(90% 80% at 50% 110%, rgba(170,70,200,.25), transparent 60%),
    #070612; }
.t-arcane .stars { position: fixed; inset: 0; pointer-events: none; opacity: .5;
  background-image:
    radial-gradient(1px 1px at 20% 30%, #fff, transparent), radial-gradient(1px 1px at 70% 20%, #cfe, transparent),
    radial-gradient(1px 1px at 40% 70%, #fff, transparent), radial-gradient(1.5px 1.5px at 85% 60%, #adf, transparent),

.t-arcane .res { display: flex; align-items: center; gap: 5px; border-radius: 18px; padding: 4px 13px;

.t-arcane .mcard { width: 170px; padding: 12px; border-radius: 14px; position: relative;
  background: linear-gradient(160deg, rgba(90,70,170,.3), rgba(24,20,50,.7));
  border: 1px solid rgba(150,170,255,.35); box-shadow: 0 0 24px rgba(110,100,220,.25), inset 0 1px 0 rgba(255,255,255,.1); }
.t-arcane .mcard .cn { font-family: 'Cinzel', serif; font-weight: 700; color: #e8e2ff; font-size: 14px; }
.t-arcane .mcard .cc { position: absolute; top: 10px; right: 11px; width: 28px; height: 28px; border-radius: 50%;

  display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(120,160,255,.7); }
.t-arcane .mcard .ty { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #8fe0b0; margin-top: 3px; }
.t-arcane .mcard .ty.power { color: #8fb6ff; } .t-arcane .mcard .ty.spell { color: #d9a0ff; }
.t-arcane .mcard .tx { font-size: 12px; color: #cfd6f0; margin-top: 7px; line-height: 1.4; }

<script>
(function () {
  'use strict';

  /* ---- shared sample state ---- */
  const S = {
    week: 3, lord: 'Lord Roland', town: 'Castle', glory: 34, renown: 23,
    tracks: { realm: { ic: '🏰', nm: 'Realm', v: 6, max: 14 }, sorcery: { ic: '🔮', nm: 'Sorcery', v: 4, max: 14 }, frontier: { ic: '🗺️', nm: 'Frontier', v: 3, max: 9 } },
    res: [ ['🪙','Gold',42,'+20'], ['🪵','Wood',3,'+1'], ['🪨','Ore',5,'+1'], ['💎','Crystal',1,'+0'], ['⚔️','Recruits',4,'+2'], ['⚗️','Mercury',2,'+1'] ],

    hand: [
      { nm: 'Archangel Spire', cost: 22, ty: 'Structure', tyc: '', tags: '🐾 Creature · 🛡️ Might', tx: '+2 Recruit production. Advance Realm 1 step.', vp: 3 },
      { nm: "Spellbinder's Hat", cost: 9, ty: 'Power', tyc: 'power', tags: '🔮 Magic · 👑 Wealth', tx: 'When you advance Sorcery, draw a card.', gold: true },
      { nm: 'Meteor Shower', cost: 12, ty: 'Spell', tyc: 'spell', tags: '🔮 Magic', tx: 'Advance Sorcery 2 steps.' },
      { nm: 'Crag Hack', cost: 9, ty: 'Power', tyc: 'power', tags: '🎖️ Hero · 🛡️ Might', tx: 'Action: pay 3 Gold → gain 3 Recruits.', vp: 1, gold: true },

  const pct = t => Math.round(100 * t.v / t.max) + '%';

  /* ---- hex map builder (recolored per theme) ---- */
  function hexMap(pal, h) {
    const R = 3, size = 22, dirs = [];
    const cells = [];
    for (let q = -R; q <= R; q++) for (let r = Math.max(-R, -q - R); r <= Math.min(R, -q + R); r++) cells.push([q, r]);
    let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
    const pos = cells.map(([q, r]) => {
      const x = size * Math.sqrt(3) * (q + r / 2), y = size * 1.5 * r;
      minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y);
      return [x, y];
    });
    const pad = size + 6;
    const vbW = (maxX - minX) + 2 * pad, vbH = (maxY - minY) + 2 * pad;
    const hexPts = (cx, cy) => { let p = []; for (let i = 0; i < 6; i++) { const a = Math.PI / 180 * (60 * i - 30); p.push((cx + size * Math.cos(a)).toFixed(1) + ',' + (cy + size * Math.sin(a)).toFixed(1)); } return p.join(' '); };
    let body = '';
    const tokens = { '0,0': '🏰', '1,-1': '⛏️', '-1,1': '🚩', '2,0': '🏰', '-2,1': '⛏️' };
    cells.forEach(([q, r], i) => {
      const [x, y] = pos[i];
      const col = pal.terrains[(Math.abs(q * 7 + r * 13 + q * q)) % pal.terrains.length];
      body += `<polygon points="${hexPts(x, y)}" fill="${col}" stroke="${pal.stroke}" stroke-width="1.1" stroke-linejoin="round"/>`;
      body += `<polygon points="${hexPts(x, y)}" fill="url(#sheen${h})" stroke="none"/>`;
      const tk = tokens[q + ',' + r];
      if (tk) {
        body += `<circle cx="${x}" cy="${y}" r="${size * 0.58}" fill="${pal.token}" stroke="${pal.tokenStroke}" stroke-width="2.2"/>`;
        body += `<text x="${x}" y="${y + 6}" text-anchor="middle" font-size="18">${tk}</text>`;
      } else if ((q + r) % 3 === 0) {
        body += `<text x="${x}" y="${y + 5}" text-anchor="middle" font-size="12" opacity="0.85">${['💎','🪵','🪨','✨'][(Math.abs(q + r * 2)) % 4]}</text>`;
      }
    });
    return `<svg class="hexmap" viewBox="${minX - pad} ${minY - pad} ${vbW} ${vbH}" style="aspect-ratio:${vbW}/${vbH};max-height:${pal.maxH || '46vh'}" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="sheen${h}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/><stop offset="55%" stop-color="#fff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.22"/></linearGradient></defs>${body}</svg>`;
  }

  /* ============================ THEME RENDERERS ============================ */
  const T = {};

  T.codex = {

            </div>

              ${S.acts.map(a => `<button class="act"><b>${a[0]}</b><br><small>${a[1]} — ${a[2]}</small></button>`).join('')}
            </div>
          </div>
          <div class="ill-col">
            <div class="vellum">
              <h3>The Adventure Map</h3>
              ${hexMap({ terrains: ['#7c8a4f','#9a8755','#6f7d8a','#8a6f4f','#b9a06a','#7a8a6a'], stroke: '#5a4a2a', token: '#7a1f1a', tokenStroke: '#e9cf95', maxH: '40vh' }, 'codex')}
              <div class="map-cap">…and lo, five and thirty wilds lay before the banner of ${S.town}.</div>
            </div>
            <div class="vellum" style="margin-top:14px;text-align:left">
              <p class="dropcap" style="margin:0">Astrologers proclaim the <b>${S.proc.nm}</b>. ${S.proc.tx} The coffers of the realm now hold:</p>
              <div class="res-row">${S.res.map(r => `<span class="res">${r[0]} ${r[2]}<small style="color:#8a6a37"> ${r[3]}</small></span>`).join('')}</div>
            </div>
          </div>
          <div class="right">
            <div class="vellum"><h3>Cards in Hand</h3>
              <div class="hand">${S.hand.map(c => `<div class="mcard"><div class="cc">${c.cost}</div><div class="cn">${c.nm}</div><div class="tg">${c.ty} · ${c.tags}</div><div class="tx">${c.tx}${c.vp ? ` <b style="color:#b08327">★${c.vp}</b>` : ''}</div></div>`).join('')}</div>
            </div>
            <div class="vellum" style="margin-top:14px"><h3>Your Wonder</h3>
              <p style="margin:0 0 6px"><b style="color:#7a1f1a;font-family:'Cinzel',serif">${S.wonder.nm}</b> — stage ${S.wonder.stage} of ${S.wonder.of}</p>
              <div class="tx">${S.wonder.next}</div>

        <div class="seal">WAX<br>SEAL</div>
      </div>`;
    }
  };

  T.obsidian = {
    desc: 'Cinematic dark fantasy — near-black depths, ember glow, gold filigree inner-frames. Map is the hero; panels float and breathe. Premium and focused — directly answers “too crowded”.',
    swatch: ['#0a0810', '#e8c34a', '#2a2540', '#6fa8e6'],

          </div>
        </div>`;
    }
  };

  T.wood = {

    swatch: ['#4a3119', '#e8c34a', '#44424c', '#8a1f1a'],

              <div class="res-tray">${S.res.map(r => `<span class="res">${r[0]} ${r[2]} <span style="color:#9fd3a6;font-weight:400">${r[3]}</span></span>`).join('')}</div>

        </div>
        <div class="ar-stage">
          <div class="glass"><h3>⚔ Your Turn</h3>${S.acts.map(a => `<button class="act"><span><b>${a[0]}</b><br><small style="color:#9fb6f0">${a[1]}</small></span><span class="cost">${a[2]}</span></button>`).join('')}</div>
          <div>
            <div class="proclaim">☄️ Astrologers proclaim the <b>${S.proc.nm}</b> — ${S.proc.tx}</div>
            <div class="glass"><h3 style="text-align:center;border:none">🗺️ The Adventure Map</h3>
              <div style="text-align:center">${hexMap({ terrains: ['#3a4a7a','#4a3a7a','#3a6a7a','#5a4a8a','#6a3a7a','#3a5a8a'], stroke: '#0a0820', token: '#5a4ad0', tokenStroke: '#9fe0ff' }, 'arc')}</div>
              <div class="res-hud">${S.res.map(r => `<span class="res">${r[0]} <b>${r[2]}</b> <small>${r[3]}</small></span>`).join('')}</div>

  T.herald = {
    desc: 'Royal heraldry — deep crimson field, gold pennants and shields, ❧ flourishes. Bold, noble, ceremonial. Strong identity; resources shown as a row of shields.',

    html() {
      return `<div class="hd-top">
          <div class="hd-brand">Conquest of Erathia</div>
          <div class="hd-tracks">${Object.values(S.tracks).map(t => `<div class="pennant"><div class="lbl">${t.ic} ${t.nm}</div><div class="vl">${t.v}/${t.max}</div></div>`).join('')}</div>
        </div>
        <div class="hd-stage">
          <div class="scroll dark"><h3>⚔ Your Turn</h3>${S.acts.map(a => `<button class="ibtn">${a[0]} <span style="float:right">${a[2]}</span><small>${a[1]}</small></button>`).join('')}</div>
          <div>
            <div class="proclaim">☄️ Astrologers proclaim the <b>${S.proc.nm}</b> — ${S.proc.tx}</div>
            <div class="scroll"><h3 style="text-align:center">🗺️ The Adventure Map</h3>
              <div class="map-wrap">${hexMap({ terrains: ['#8a7a4a','#9a6a4a','#7a8a5a','#6a7a6a','#a88a5a','#7a6a4a'], stroke: '#3a1410', token: '#7a1f1a', tokenStroke: '#f6d77a' }, 'her')}</div>
            </div>
            <div class="shield-row">${S.res.map(r => `<div class="shield"><div class="ic">${r[0]}</div><span class="nm">${r[2]}</span><small>${r[3]}</small></div>`).join('')}</div>
            <div class="hand">${S.hand.map(c => `<div class="mcard"><div class="cc">${c.cost}</div><div class="cn">${c.nm}</div><div class="tx" style="font-size:11px;color:#7a4a30">${c.ty} · ${c.tags}</div><div class="tx">${c.tx}</div></div>`).join('')}</div>
          </div>
          <div class="scroll"><h3>🎯 Goals</h3>${S.goals.map(g => `<div class="goal"><span>${g[0]}</span><small style="color:#7a4a30">${g[1]}</small></div>`).join('')}
            <h3 style="margin-top:14px">✦ Wonder</h3><div style="font-size:13px">${S.wonder.nm}<br><small style="color:#7a4a30">Stage ${S.wonder.stage}/${S.wonder.of}</small></div>
          </div>
        </div>`;
    }
  };

  /* ---- wiring ---- */
  const stage = document.getElementById('stage');
  const picker = document.getElementById('picker');
  const desc = document.getElementById('desc');
  const swatch = document.getElementById('swatch');
  function show(key) {
    const t = T[key];
    document.body.className = '';
    stage.className = 't-' + key;
    stage.innerHTML = t.html();
    desc.textContent = t.desc;
    swatch.innerHTML = t.swatch.map(c => `<i style="background:${c}"></i>`).join('');
    window.scrollTo(0, 0);
  }
  picker.addEventListener('change', () => show(picker.value));
  show('codex');
})();
</script>
</body>
</html>
